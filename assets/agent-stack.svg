<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentForge agent stack</title>
  <desc id="desc">A warm minimal stack showing main agent orchestration over focused subagents.</desc>
  <rect width="1200" height="420" rx="32" fill="#F7F1E8"/>
  <rect x="424" y="62" width="352" height="96" rx="28" fill="#2F2A25"/>
  <text x="600" y="103" text-anchor="middle" fill="#FFF7EA" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="750">Main Agent</text>
  <text x="600" y="132" text-anchor="middle" fill="#DCCAB4" font-family="Inter, ui-sans-serif, system-ui" font-size="16">synthesis · judgment · final verification</text>

  <path d="M600 158V216" stroke="#B8926B" stroke-width="3" stroke-linecap="round"/>
  <path d="M240 216H960" stroke="#B8926B" stroke-width="3" stroke-linecap="round"/>
  <path d="M240 216V248M420 216V248M600 216V248M780 216V248M960 216V248" stroke="#B8926B" stroke-width="3" stroke-linecap="round"/>

  <g font-family="Inter, ui-sans-serif, system-ui" text-anchor="middle">
    <rect x="124" y="248" width="232" height="98" rx="24" fill="#FFFDF8" stroke="#DFC7AD"/>
    <text x="240" y="291" fill="#2F2A25" font-size="20" font-weight="700">Scout</text>
    <text x="240" y="319" fill="#75695D" font-size="15">read, map, report</text>

    <rect x="304" y="248" width="232" height="98" rx="24" fill="#FFFDF8" stroke="#DFC7AD"/>
    <text x="420" y="291" fill="#2F2A25" font-size="20" font-weight="700">Implementer</text>
    <text x="420" y="319" fill="#75695D" font-size="15">one task only</text>

    <rect x="484" y="248" width="232" height="98" rx="24" fill="#FFFDF8" stroke="#DFC7AD"/>
    <text x="600" y="291" fill="#2F2A25" font-size="20" font-weight="700">Spec Review</text>
    <text x="600" y="319" fill="#75695D" font-size="15">did we build the right thing?</text>

    <rect x="664" y="248" width="232" height="98" rx="24" fill="#FFFDF8" stroke="#DFC7AD"/>
    <text x="780" y="291" fill="#2F2A25" font-size="20" font-weight="700">Quality Review</text>
    <text x="780" y="319" fill="#75695D" font-size="15">is it built well?</text>

    <rect x="844" y="248" width="232" height="98" rx="24" fill="#FFFDF8" stroke="#DFC7AD"/>
    <text x="960" y="291" fill="#2F2A25" font-size="20" font-weight="700">Integration</text>
    <text x="960" y="319" fill="#75695D" font-size="15">prove the whole</text>
  </g>
</svg>
